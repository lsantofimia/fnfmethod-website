<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0E0E10" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Luis Santofimia · FnF Method</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ---------- vCard generation ----------
    function buildVCard(d) {
      const lines = [
        "BEGIN:VCARD",
        "VERSION:3.0",
        `N:${d.lastName || ""};${d.firstName || ""};;;`,
        `FN:${[d.firstName, d.lastName].filter(Boolean).join(" ")}`,
        d.company ? `ORG:${d.company}` : "",
        d.title ? `TITLE:${d.title}` : "",
        d.phone ? `TEL;TYPE=CELL,VOICE:${d.phone}` : "",
        d.email ? `EMAIL;TYPE=INTERNET:${d.email}` : "",
        d.website ? `URL:${d.website}` : "",
        d.instagram ? `X-SOCIALPROFILE;TYPE=instagram:${d.instagram}` : "",
        d.facebook ? `X-SOCIALPROFILE;TYPE=facebook:${d.facebook}` : "",
        d.whatsapp ? `IMPP;TYPE=whatsapp:${d.whatsapp}` : "",
        d.note ? `NOTE:${d.note}` : "",
        "END:VCARD",
      ].filter(Boolean);
      return lines.join("\r\n");
    }

    function downloadVCard(d) {
      const vcard = buildVCard(d);
      const blob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const fileName = `${(d.firstName || "contact").toLowerCase()}-${(d.lastName || "card").toLowerCase()}.vcf`;
      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    // ---------- Icons ----------
    const Icon = {
      WhatsApp: () => (
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51l-.57-.01c-.198 0-.52.074-.792.372s-1.04 1.016-1.04 2.479 1.065 2.876 1.213 3.074c.149.198 2.095 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zM12.04 21.785h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.889-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.886 9.884zm8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
        </svg>
      ),
      Facebook: () => (
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
      ),
      Instagram: () => (
        <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true">
          <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
        </svg>
      ),
      Globe: () => (
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      ),
      Phone: () => (
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      ),
      Mail: () => (
        <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          <polyline points="22,6 12,13 2,6"/>
        </svg>
      ),
      Download: () => (
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
      ),
      Check: () => (
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round" aria-hidden="true">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      ),
    };

    // ---------- Card ----------
    function Card({ data, theme }) {
      const [saved, setSaved] = useState(false);
      const [copied, setCopied] = useState(false);

      const fullName = [data.firstName, data.lastName].filter(Boolean).join(" ");
      const initials = (data.firstName?.[0] || "") + (data.lastName?.[0] || "");

      const handleSave = () => {
        downloadVCard(data);
        setSaved(true);
        setTimeout(() => setSaved(false), 2400);
      };

      const handleCopy = async (text) => {
        try {
          await navigator.clipboard.writeText(text);
          setCopied(text);
          setTimeout(() => setCopied(false), 1600);
        } catch (e) {}
      };

      const isDark = theme.mode === "dark";
      const bg = isDark ? "#0E0E10" : "#F6F4EF";
      const surface = isDark ? "#17171B" : "#FFFFFF";
      const text = isDark ? "#F2F0EB" : "#16161A";
      const muted = isDark ? "#8A8A92" : "#6B6B72";
      const hairline = isDark ? "rgba(255,255,255,0.08)" : "rgba(20,20,22,0.08)";
      const accent = theme.accent;

      const socials = [
        data.whatsapp && { key: "whatsapp", label: "WhatsApp", href: data.whatsapp, Icon: Icon.WhatsApp, color: "#25D366" },
        data.facebook && { key: "facebook", label: "Facebook", href: data.facebook, Icon: Icon.Facebook, color: "#1877F2" },
        data.instagram && { key: "instagram", label: "Instagram", href: data.instagram.startsWith("http") ? data.instagram : `https://instagram.com/${data.instagram.replace(/^@/, "")}`, Icon: Icon.Instagram, color: "#E1306C" },
        data.website && { key: "website", label: "Website", href: data.website, Icon: Icon.Globe, color: accent },
      ].filter(Boolean);

      return (
        <div className="page" style={{ background: bg, color: text }}>
          <div className="card-wrap">
            <article
              className="card"
              style={{
                background: surface,
                borderColor: hairline,
                color: text,
              }}
            >
              <div className="hero">
                <div className="hero-photo">
                  {data.photoUrl ? (
                    <img src={data.photoUrl} alt={fullName} />
                  ) : (
                    <div className="photo-placeholder" style={{ background: isDark ? "#1F1F25" : "#E8E4DC", color: muted }}>
                      <div className="initials" style={{ color: text }}>{initials || "L"}</div>
                      <div className="ph-label">Foto Luis</div>
                    </div>
                  )}
                </div>
                <div className="nfc-tag-float">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round">
                    <path d="M2 12c2-3 4-3 6 0s4 3 6 0 4-3 6 0"/>
                  </svg>
                  <span>tap · nfc</span>
                </div>
                <div className="hero-fade" style={{ background: `linear-gradient(to bottom, transparent 0%, transparent 50%, ${surface} 100%)` }}></div>
              </div>

              <section className="identity">
                <div className="eyebrow" style={{ color: accent }}>
                  <span className="eyebrow-dot" style={{ background: accent }}></span>
                  {data.title}
                </div>
                <h1 className="name">{fullName}</h1>
                {data.tagline && (
                  <p className="tagline" style={{ color: muted }}>{data.tagline}</p>
                )}
              </section>

              {socials.length > 0 && (
                <nav className="socials" aria-label="Social links">
                  {socials.map((s) => (
                    <a
                      key={s.key}
                      href={s.href}
                      target="_blank"
                      rel="noopener noreferrer"
                      className="bubble"
                      style={{ borderColor: hairline, color: text }}
                      aria-label={s.label}
                    >
                      <span className="bubble-icon" style={{ color: s.color }}>
                        <s.Icon />
                      </span>
                    </a>
                  ))}
                </nav>
              )}

              <ul className="contact-list">
                {data.phone && (
                  <li className="contact-row" style={{ borderColor: hairline }}>
                    <a href={`tel:${data.phone}`} className="contact-link" style={{ color: text }}>
                      <span className="contact-icon" style={{ color: muted }}><Icon.Phone /></span>
                      <span className="contact-text">
                        <span className="contact-label" style={{ color: muted }}>Teléfono</span>
                        <span className="contact-value">{data.phone}</span>
                      </span>
                    </a>
                    <button className="copy-btn" style={{ color: muted, borderColor: hairline }} onClick={() => handleCopy(data.phone)} aria-label="Copiar teléfono">
                      {copied === data.phone ? <Icon.Check /> : "Copiar"}
                    </button>
                  </li>
                )}
                {data.email && (
                  <li className="contact-row" style={{ borderColor: hairline }}>
                    <a href={`mailto:${data.email}`} className="contact-link" style={{ color: text }}>
                      <span className="contact-icon" style={{ color: muted }}><Icon.Mail /></span>
                      <span className="contact-text">
                        <span className="contact-label" style={{ color: muted }}>Email</span>
                        <span className="contact-value">{data.email}</span>
                      </span>
                    </a>
                    <button className="copy-btn" style={{ color: muted, borderColor: hairline }} onClick={() => handleCopy(data.email)} aria-label="Copiar email">
                      {copied === data.email ? <Icon.Check /> : "Copiar"}
                    </button>
                  </li>
                )}
              </ul>

              <div className="cta-wrap">
                <button
                  className={`cta ${saved ? "saved" : ""}`}
                  onClick={handleSave}
                  style={{
                    background: saved ? "#16A34A" : accent,
                    color: "#fff",
                  }}
                >
                  <span className="cta-icon">
                    {saved ? <Icon.Check /> : <Icon.Download />}
                  </span>
                  <span className="cta-label">
                    {saved ? "Contacto guardado" : "Guardar contacto"}
                  </span>
                </button>
                <p className="cta-help" style={{ color: muted }}>
                  Se descargará un archivo <code>.vcf</code> que tu teléfono abrirá automáticamente.
                </p>
              </div>

              <footer className="card-footer" style={{ color: muted, borderColor: hairline }}>
                <span>© {new Date().getFullYear()} {data.company}</span>
                <span className="dot-sep">·</span>
                <span>Tarjeta digital</span>
              </footer>
            </article>
          </div>
        </div>
      );
    }

    // ---------- Mount ----------
    const DATA = {
      firstName:    "Luis",
      lastName:     "Santofimia",
      title:        "Founder",
      company:      "FnF Method",
      companyShort: "FnF",
      tagline:      "Fix & Flip · South Florida\nTransformamos propiedades en oportunidades.",
      phone:        "+1 (786) 676-8471",
      email:        "lsantofimia@fnfmethod.com",
      whatsapp:     "https://wa.me/+17866768471",
      facebook:     "https://www.facebook.com/profile.php?id=61575736783426",
      instagram:    "https://www.instagram.com/fnfmethod",
      website:      "https://fnfmethod.com",
      photoUrl:     "luis.png",
    };

    const THEME = {
      mode:   "dark",
      accent: "#e46400",
    };

    ReactDOM.createRoot(document.getElementById("root")).render(
      React.createElement(Card, { data: DATA, theme: THEME })
    );
  </script>
</body>
</html>
